spring.application.name=springAi-FC
server.port=8082

# ============================================
# AWS Bedrock Configuration
# ============================================
# AWS 리전 설정
spring.ai.bedrock.aws.region=ap-northeast-2

# AWS 자격 증명 (환경 변수 사용)
spring.ai.bedrock.aws.access-key=${AWS_ACCESS_KEY_ID:}
spring.ai.bedrock.aws.secret-key=${AWS_SECRET_ACCESS_KEY:}

# Bedrock Converse API 설정 (Messages API 지원)
spring.ai.bedrock.converse.chat.enabled=true
spring.ai.bedrock.converse.chat.options.model=global.anthropic.claude-sonnet-4-5-20250929-v1:0
spring.ai.bedrock.converse.chat.options.temperature=0.7
spring.ai.bedrock.converse.chat.options.max-tokens=1024

# ============================================
# OpenWeatherMap API Configuration (선택사항)
# ============================================
# 실제 날씨 정보를 가져오려면 환경변수로 설정:
# export OPENWEATHER_API_KEY="your-api-key-here"
# 
# API 키 발급: https://openweathermap.org/api
# - 무료 플랜 사용 가능
# - 하루 1,000회 호출 제한
# 
# API 키가 없으면 Mock 데이터를 반환합니다.

# ============================================
# MongoDB Configuration
# ============================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=chatdb
spring.data.mongodb.username=admin
spring.data.mongodb.password=admin123
spring.data.mongodb.authentication-database=admin

# Logging
logging.level.root=INFO
logging.level.com.example.springai=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.software.amazon.awssdk=INFO
logging.level.org.springframework.data.mongodb=DEBUG

